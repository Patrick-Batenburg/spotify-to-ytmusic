name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: spotify-to-ytmusic-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: spotify-to-ytmusic-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: spotify-to-ytmusic-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: spotify-to-ytmusic-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/spotify-to-ytmusic ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/spotify-to-ytmusic.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/rust/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
